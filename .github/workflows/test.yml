name: Test

on:
    pull_request:

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            -   uses: actions/checkout@v6

            -   name: Setup mise
                uses: jdx/mise-action@v3

            -   name: Cache Bun dependencies
                uses: actions/cache@v5
                with:
                    path: ~/.bun/install/cache
                    key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
                    restore-keys: |
                        ${{ runner.os }}-bun-

            -   name: Install dependencies
                run: mise exec -- bun install --frozen-lockfile

            -   name: Check generated train-number content
                run: mise exec -- bun run check:train-number-content

            -   name: Lint
                run: mise exec -- bun run lint

            -   name: Format
                run: mise exec -- bun run format

            -   name: Type Check
                run: mise exec -- bun run check

            -   name: Test
                run: mise exec -- bun run test

            -   name: Build
                run: mise exec -- bun run build:cf
